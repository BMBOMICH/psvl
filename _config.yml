title: PSVL — Proprietary Source-Visible License
description: >-
  A comprehensive source-visible license template for solo developers
  and indie teams who want to show their code without giving it away.
  460+ active sub-clauses across 9 sections.
url: https://bmbomich.github.io
baseurl: /psvl
theme: jekyll-theme-cayman
show_downloads: true
author: Elxan Hüseynov
lang: en
encoding: utf-8
timezone: UTC
markdown: kramdown
highlighter: rouge
permalink: pretty
repository: BMBOMICH/psvl
github_username: BMBOMICH
webmaster_verifications:
  google: bX4_Ne4DO91_SLSfGuwLCBAvBAFrhqxzqOMHw1_AH-8
  bing: EA9FF2283664FE55662D2CBEE1565E23
social:
  name: Elxan Hüseynov
  links:
    - https://github.com/BMBOMICH
kramdown:
  input: GFM
  auto_ids: true
sass:
  style: compressed
include:
  - CONTRIBUTING.md
  - SECURITY.md
  - DISCLAIMER.md
  - CHANGELOG.md
  - CODE_OF_CONDUCT.md
  - SUPPORT.md
  - GOVERNANCE.md
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .github
  - .gitignore
  - .gitattributes
  - .editorconfig
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-readme-index
  - jekyll-titles-from-headings
  - jekyll-github-metadata
  - jekyll-include-cache
  - jekyll-optional-front-matter
  - jekyll-relative-links
  - jekyll-redirect-from
defaults:
  - scope:
      path: ""
    values:
      layout: default
